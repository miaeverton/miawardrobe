<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mia's Outfits</title>
<meta name="description" content="Personal AI stylist — visual outfit boards from your real wardrobe">
<meta name="theme-color" content="#faf9f7">
<link rel="manifest" href="/manifest.json">
<style>
/* ── Reset & tokens ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf9f7;
  --surface: #ffffff;
  --border: #e8e4de;
  --text: #1a1a1a;
  --muted: #6b6560;
  --accent: #2c2c2c;
  --green: #2d6b3a;
  --green-bg: #eef5f0;
  --blue: #1a3a5a;
  --blue-bg: #e8eff5;
  --purple: #3a1a5a;
  --purple-bg: #ede8f5;
  --amber: #7a5a1a;
  --amber-bg: #f5f0e8;
  --red: #8c3030;
  --radius: 2px;
  --font: -apple-system, "Helvetica Neue", Arial, sans-serif;
  --serif: Georgia, "Times New Roman", serif;
}

html { background: var(--bg); -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
}

/* ── Layout ──────────────────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; min-height: 100dvh; }

header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: env(safe-area-inset-top, 0) 0 0;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
}
.logo {
  font-family: var(--serif);
  font-size: 18px; font-weight: 400;
  letter-spacing: .04em;
  color: var(--text);
  text-decoration: none;
}
.logo span { color: var(--muted); font-size: 12px; margin-left: 6px; }

.tab-bar {
  display: flex; border-top: 1px solid var(--border);
}
.tab {
  flex: 1; padding: 10px 0; background: none; border: none;
  font-family: var(--font); font-size: 11px;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

main { flex: 1; padding-bottom: env(safe-area-inset-bottom, 16px); }

/* ── Views ───────────────────────────────────────────────────────────── */
.view { display: none; }
.view.active { display: block; }

/* ── Prompt view ─────────────────────────────────────────────────────── */
.prompt-section {
  padding: 20px 16px 0;
}
.prompt-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); margin-bottom: 10px;
}
.prompt-box {
  position: relative;
}
.prompt-input {
  width: 100%;
  padding: 14px 52px 14px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font); font-size: 16px;
  color: var(--text); outline: none;
  resize: none; min-height: 56px; max-height: 140px;
  line-height: 1.4;
  transition: border-color .15s;
}
.prompt-input:focus { border-color: var(--text); }
.prompt-input::placeholder { color: var(--muted); }
.prompt-submit {
  position: absolute; right: 10px; bottom: 10px;
  width: 36px; height: 36px;
  background: var(--text); border: none; border-radius: var(--radius);
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.prompt-submit:disabled { opacity: .35; cursor: default; }
.prompt-submit svg { width: 16px; height: 16px; }

.count-row {
  display: flex; gap: 8px; align-items: center;
  padding: 12px 16px 0;
}
.count-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.count-btns { display: flex; gap: 4px; }
.count-btn {
  padding: 4px 10px; border: 1px solid var(--border);
  background: var(--bg); border-radius: var(--radius);
  font-family: var(--font); font-size: 12px; color: var(--muted);
  cursor: pointer; transition: all .12s;
}
.count-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

.suggestions {
  padding: 14px 16px 0;
  display: flex; flex-wrap: wrap; gap: 7px;
}
.suggestion {
  padding: 7px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  transition: all .12s; white-space: nowrap;
}
.suggestion:hover { border-color: var(--text); color: var(--text); }

/* ── Loading state ───────────────────────────────────────────────────── */
.loading-state {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 24px; gap: 14px; text-align: center;
}
.loading-state.visible { display: flex; }
.spinner {
  width: 32px; height: 32px; border: 2px solid var(--border);
  border-top-color: var(--text); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg {
  font-family: var(--serif); font-size: 14px;
  color: var(--muted); font-style: italic;
}

/* ── Error state ─────────────────────────────────────────────────────── */
.error-banner {
  display: none; margin: 16px; padding: 12px 14px;
  background: #fdf0f0; border: 1px solid #f0c8c8; border-radius: var(--radius);
  font-size: 13px; color: var(--red);
}
.error-banner.visible { display: block; }

/* ── Outfit boards ───────────────────────────────────────────────────── */
.boards-container { padding: 16px 0 24px; }

.board {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
  overflow: hidden;
}

.board-header {
  padding: 16px 16px 12px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
}
.board-meta { flex: 1; }
.board-rank {
  font-size: 10px; text-transform: uppercase; letter-spacing: .09em;
  color: var(--muted); margin-bottom: 4px;
}
.board-title {
  font-family: var(--serif); font-size: 17px; font-weight: 400;
  margin-bottom: 4px; line-height: 1.3;
}
.board-mood { font-size: 12px; color: var(--muted); font-style: italic; }
.ns-badge {
  font-size: 9px; padding: 4px 10px; border: 1px solid;
  letter-spacing: .06em; text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0; margin-top: 2px;
}

/* pieces grid — horizontal scroll on mobile */
.pieces-scroll {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding: 0 16px 12px;
  scrollbar-width: none;
}
.pieces-scroll::-webkit-scrollbar { display: none; }
.pieces-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 110px);
  grid-auto-flow: column;
  gap: 8px;
  width: max-content;
}
.piece {
  width: 110px; display: flex; flex-direction: column;
}
.piece-img {
  width: 110px; height: 110px;
  background: #f5f3f0; overflow: hidden; margin-bottom: 6px;
  flex-shrink: 0;
}
.piece-img img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .3s;
}
.piece:active .piece-img img { transform: scale(1.05); }
.piece-img-missing {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--muted); text-align: center; padding: 8px;
}
.piece-role {
  font-size: 8px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); margin-bottom: 2px;
}
.piece-name { font-size: 10px; line-height: 1.3; margin-bottom: 1px; }
.piece-brand {
  font-size: 9px; text-transform: uppercase; letter-spacing: .04em;
  color: var(--muted);
}

/* detail panels */
.board-details { padding: 0 16px 4px; }

.tuck-block {
  padding: 10px 12px; background: var(--green-bg);
  border-left: 3px solid #8cba8c; margin-bottom: 10px;
  font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.5;
}
.tuck-lbl {
  display: inline-block; font-size: 9px; text-transform: uppercase;
  letter-spacing: .09em; color: var(--green); font-style: normal;
  font-weight: 600; margin-right: 6px;
}

.shoe-section { margin-bottom: 10px; }
.shoe-section-lbl {
  font-size: 9px; text-transform: uppercase; letter-spacing: .09em;
  color: var(--muted); margin-bottom: 8px;
}
.shoe-options { display: flex; flex-direction: column; gap: 8px; }
.shoe-opt {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 12px; background: var(--bg);
  border: 1px solid var(--border);
}
.shoe-opt img {
  width: 64px; height: 64px; object-fit: cover;
  background: #f5f3f0; flex-shrink: 0; border: 1px solid var(--border);
}
.shoe-badge {
  display: inline-block; font-size: 9px; padding: 2px 7px;
  background: var(--green-bg); color: var(--green); margin-bottom: 3px;
  font-family: var(--font);
}
.shoe-badge.alt { background: #f5f2ee; color: var(--muted); }
.shoe-name { font-size: 11px; font-weight: 500; margin-bottom: 3px; line-height: 1.3; }
.shoe-why { font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.5; }

.principles-section { margin-bottom: 10px; }
.principles-lbl {
  font-size: 9px; text-transform: uppercase; letter-spacing: .09em;
  color: var(--muted); margin-bottom: 6px;
}
.principles-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.principles-list li {
  font-size: 11px; color: var(--muted); font-style: italic;
  padding: 4px 8px; background: var(--bg);
  border-left: 2px solid var(--border); line-height: 1.5;
}

.why-block {
  padding: 10px 12px; background: var(--blue-bg);
  border-left: 3px solid #7aaad4; margin-bottom: 10px;
  font-size: 12px; color: var(--blue); line-height: 1.6;
}
.why-lbl {
  display: block; font-size: 9px; text-transform: uppercase;
  letter-spacing: .09em; font-weight: 600; margin-bottom: 4px; font-style: normal;
  font-family: var(--font);
}

.board-actions {
  padding: 4px 16px 16px;
  display: flex; gap: 8px;
}
.action-btn {
  flex: 1; padding: 10px 0;
  border: 1px solid var(--border); background: var(--bg);
  font-family: var(--font); font-size: 12px; color: var(--muted);
  cursor: pointer; letter-spacing: .04em; transition: all .12s;
}
.action-btn.save-btn.saved {
  background: var(--green-bg); color: var(--green); border-color: #8cba8c;
}
.action-btn:active { opacity: .7; }

/* expand/collapse */
.board-toggle {
  width: 100%; padding: 10px 16px;
  background: none; border: none; border-top: 1px solid var(--border);
  font-family: var(--font); font-size: 11px; color: var(--muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  letter-spacing: .04em; text-transform: uppercase;
}
.toggle-icon { transition: transform .2s; font-size: 10px; }
.board.expanded .toggle-icon { transform: rotate(180deg); }
.board-collapsible { display: none; }
.board.expanded .board-collapsible { display: block; }

/* ── Gallery view ────────────────────────────────────────────────────── */
.gallery-header {
  padding: 20px 16px 12px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.gallery-title {
  font-family: var(--serif); font-size: 18px; font-weight: 400;
}
.gallery-count { font-size: 11px; color: var(--muted); font-style: italic; }
.gallery-empty {
  padding: 60px 24px; text-align: center;
  color: var(--muted); font-style: italic; font-family: var(--serif);
  font-size: 15px; line-height: 1.8;
}
.gallery-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 1px; background: var(--border);
  padding: 0;
}
.gallery-card {
  background: var(--surface); padding: 12px;
  cursor: pointer;
}
.gallery-card-images {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 3px; margin-bottom: 8px;
}
.gallery-thumb {
  aspect-ratio: 1; overflow: hidden; background: #f5f3f0;
}
.gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
.gallery-card-title {
  font-size: 12px; font-weight: 500; margin-bottom: 2px; line-height: 1.3;
}
.gallery-card-meta { font-size: 10px; color: var(--muted); font-style: italic; }

/* ── Wardrobe view ───────────────────────────────────────────────────── */
.wardrobe-header {
  padding: 20px 16px 12px;
  display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px;
}
.wardrobe-title {
  font-family: var(--serif); font-size: 18px; font-weight: 400;
}
.search-input {
  width: 100%; margin: 0 16px 12px;
  width: calc(100% - 32px);
  padding: 10px 12px; border: 1px solid var(--border);
  background: var(--surface); font-family: var(--font);
  font-size: 14px; color: var(--text); outline: none;
}
.cat-filters {
  padding: 0 16px 12px;
  display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-filters::-webkit-scrollbar { display: none; }
.cat-btn {
  padding: 5px 12px; border: 1px solid var(--border);
  background: var(--bg); border-radius: var(--radius);
  font-family: var(--font); font-size: 11px; color: var(--muted);
  cursor: pointer; white-space: nowrap; transition: all .12s;
  letter-spacing: .04em; text-transform: uppercase;
}
.cat-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
.wardrobe-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border); padding: 0 0 24px;
}
.wardrobe-item { background: var(--surface); }
.wardrobe-img {
  width: 100%; aspect-ratio: 1; overflow: hidden; background: #f5f3f0;
}
.wardrobe-img img { width: 100%; height: 100%; object-fit: cover; }
.wardrobe-info { padding: 6px 8px 8px; }
.wardrobe-id { font-size: 8px; color: var(--muted); font-style: italic; font-family: monospace; }
.wardrobe-name { font-size: 10px; line-height: 1.3; margin-bottom: 1px; }
.wardrobe-brand { font-size: 9px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (min-width: 640px) {
  .header-inner { padding: 16px 24px; }
  .prompt-section { padding: 24px 24px 0; }
  .count-row { padding: 12px 24px 0; }
  .suggestions { padding: 14px 24px 0; }
  .boards-container { padding: 24px 0; }
  .board-header { padding: 20px 24px 14px; }
  .pieces-scroll { padding: 0 24px 14px; }
  .board-details, .board-actions { padding-left: 24px; padding-right: 24px; }
  .board-toggle { padding: 12px 24px; }
  .wardrobe-grid { grid-template-columns: repeat(4, 1fr); }
  .gallery-grid { grid-template-columns: repeat(3, 1fr); }
  .pieces-grid { grid-template-columns: repeat(auto-fill, 120px); }
  .piece { width: 120px; }
  .piece-img { width: 120px; height: 120px; }
}

@media (min-width: 1024px) {
  .main-content { max-width: 800px; margin: 0 auto; }
  .wardrobe-grid { grid-template-columns: repeat(5, 1fr); }
  .gallery-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-inner">
      <a href="/" class="logo">Mia's Outfits <span>AI Stylist</span></a>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-view="generate">Generate</button>
      <button class="tab" data-view="gallery">Saved</button>
      <button class="tab" data-view="wardrobe">Wardrobe</button>
    </div>
  </header>

  <main>
    <div class="main-content">

      <!-- ── Generate view ─────────────────────────────────── -->
      <div class="view active" id="view-generate">
        <div class="prompt-section">
          <div class="prompt-label">What do you need?</div>
          <div class="prompt-box">
            <textarea
              class="prompt-input"
              id="promptInput"
              placeholder="Dinner tonight in SF, casual dinner with friends..."
              rows="2"
              maxlength="500"
            ></textarea>
            <button class="prompt-submit" id="submitBtn" disabled aria-label="Generate outfits">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="count-row">
          <span class="count-label">Outfits</span>
          <div class="count-btns" id="countBtns">
            <button class="count-btn" data-n="3">3</button>
            <button class="count-btn active" data-n="5">5</button>
            <button class="count-btn" data-n="8">8</button>
          </div>
        </div>

        <div class="suggestions" id="suggestions">
          <button class="suggestion">Dinner tonight in SF</button>
          <button class="suggestion">Work offsite outfits</button>
          <button class="suggestion">Tahoe weekend capsule</button>
          <button class="suggestion">Date night looks</button>
          <button class="suggestion">Travel to NYC</button>
          <button class="suggestion">Leadership presentation</button>
          <button class="suggestion">California casual weekend</button>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <div class="loading-state" id="loadingState">
          <div class="spinner"></div>
          <div class="loading-msg" id="loadingMsg">Pulling looks from your wardrobe…</div>
        </div>

        <div class="boards-container" id="boardsContainer"></div>
      </div>

      <!-- ── Gallery view ──────────────────────────────────── -->
      <div class="view" id="view-gallery">
        <div class="gallery-header">
          <div class="gallery-title">Saved Outfits</div>
          <div class="gallery-count" id="galleryCount"></div>
        </div>
        <div id="galleryEmpty" class="gallery-empty" style="display:none">
          No saved outfits yet.<br>Generate outfits and tap Save to keep them here.
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
      </div>

      <!-- ── Wardrobe view ─────────────────────────────────── -->
      <div class="view" id="view-wardrobe">
        <div class="wardrobe-header">
          <div class="wardrobe-title">Wardrobe</div>
          <div class="gallery-count" id="wardrobeCount"></div>
        </div>
        <input class="search-input" id="wardrobeSearch" placeholder="Search pieces…" type="search">
        <div class="cat-filters" id="catFilters"></div>
        <div class="wardrobe-grid" id="wardrobeGrid"></div>
      </div>

    </div>
  </main>
</div>

<script>
// ── State ───────────────────────────────────────────────────────────────
let wardrobe = [];
let savedOutfits = JSON.parse(localStorage.getItem('mia_saved_outfits') || '[]');
let outfitCount = 5;
let activeView = 'generate';
let wardrobeCat = 'all';
let wardrobeQuery = '';

const LOADING_MSGS = [
  'Pulling looks from your wardrobe…',
  'Checking styling principles…',
  'Applying footwear logic…',
  'Running the final test…',
  'Almost there…'
];

// ── Boot ────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const res = await fetch('/data/wardrobe.json');
    wardrobe = await res.json();
  } catch(e) {
    console.warn('Could not load wardrobe.json', e);
    wardrobe = [];
  }
  initTabs();
  initPrompt();
  initCountBtns();
  initSuggestions();
  renderWardrobe();
  renderGallery();
  document.getElementById('wardrobeCount').textContent = `${wardrobe.length} items`;
}

// ── Tabs ────────────────────────────────────────────────────────────────
function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeView = tab.dataset.view;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
      document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === `view-${activeView}`));
      if (activeView === 'gallery') renderGallery();
    });
  });
}

// ── Prompt ──────────────────────────────────────────────────────────────
function initPrompt() {
  const input = document.getElementById('promptInput');
  const btn = document.getElementById('submitBtn');
  input.addEventListener('input', () => {
    btn.disabled = input.value.trim().length === 0;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !btn.disabled) {
      e.preventDefault();
      generate();
    }
  });
  btn.addEventListener('click', generate);
}

function initCountBtns() {
  document.getElementById('countBtns').addEventListener('click', e => {
    const btn = e.target.closest('.count-btn');
    if (!btn) return;
    outfitCount = parseInt(btn.dataset.n);
    document.querySelectorAll('.count-btn').forEach(b => b.classList.toggle('active', b === btn));
  });
}

function initSuggestions() {
  document.getElementById('suggestions').addEventListener('click', e => {
    const s = e.target.closest('.suggestion');
    if (!s) return;
    document.getElementById('promptInput').value = s.textContent;
    document.getElementById('submitBtn').disabled = false;
    generate();
  });
}

// ── Generate ────────────────────────────────────────────────────────────
async function generate() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) return;

  const submitBtn = document.getElementById('submitBtn');
  const loadingState = document.getElementById('loadingState');
  const boardsContainer = document.getElementById('boardsContainer');
  const errorBanner = document.getElementById('errorBanner');
  const loadingMsg = document.getElementById('loadingMsg');
  const suggestions = document.getElementById('suggestions');

  // Show loading
  submitBtn.disabled = true;
  errorBanner.classList.remove('visible');
  boardsContainer.innerHTML = '';
  loadingState.classList.add('visible');
  suggestions.style.display = 'none';

  // Cycle loading messages
  let msgIdx = 0;
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
    loadingMsg.textContent = LOADING_MSGS[msgIdx];
  }, 2200);

  try {
    const res = await fetch('/.netlify/functions/generate-outfits', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, count: outfitCount })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
      throw new Error(err.error || `Server error ${res.status}`);
    }

    const data = await res.json();
    renderBoards(data.outfits || []);
    // Scroll to results
    setTimeout(() => boardsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

  } catch(err) {
    errorBanner.textContent = `Could not generate outfits: ${err.message}`;
    errorBanner.classList.add('visible');
  } finally {
    clearInterval(msgInterval);
    loadingState.classList.remove('visible');
    submitBtn.disabled = false;
    suggestions.style.display = '';
  }
}

// ── Render boards ───────────────────────────────────────────────────────
const NS_STYLES = {
  'California Luxury':    { bg: '#f5f0e8', color: '#7a5a1a', border: '#d4b87a' },
  'Parisian Refinement':  { bg: '#e8eff5', color: '#1a3a5a', border: '#7aaad4' },
  'Copenhagen Creativity':{ bg: '#ede8f5', color: '#3a1a5a', border: '#aa7ad4' },
};
const RANK_LABELS = [
  'Most likely your stylist\'s pick',
  'Second choice', 'Third choice',
  'Fourth choice', 'Fifth choice',
  'Sixth', 'Seventh', 'Eighth'
];

function wardrobeItem(id) {
  return wardrobe.find(it => it.id === id);
}

function renderBoards(outfits) {
  const container = document.getElementById('boardsContainer');
  container.innerHTML = '';
  if (!outfits.length) {
    container.innerHTML = '<div style="padding:40px 24px;text-align:center;color:var(--muted);font-style:italic">No outfits returned. Try a different prompt.</div>';
    return;
  }
  outfits.forEach((outfit, i) => {
    container.appendChild(buildBoard(outfit, i));
  });
}

function buildBoard(outfit, idx) {
  const ns = NS_STYLES[outfit.north_star] || NS_STYLES['California Luxury'];
  const rankLabel = RANK_LABELS[idx] || `#${idx + 1}`;
  const isSaved = savedOutfits.some(s => s.id === outfit.id);

  const board = document.createElement('div');
  board.className = 'board';
  board.dataset.outfitId = outfit.id;

  // Pieces — filter out shoe_primary from pieces if it's already there
  const mainPieces = (outfit.pieces || []).filter(p => p.item);

  const piecesHtml = mainPieces.map(p => {
    const imgSrc = p.item?.image || '';
    return `<div class="piece">
      <div class="piece-img">
        ${imgSrc
          ? `<img src="${imgSrc}" alt="${p.item?.name || ''}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=piece-img-missing>${p.item?.id||''}</div>'">`
          : `<div class="piece-img-missing">${p.item?.id || 'No image'}</div>`
        }
      </div>
      <div class="piece-role">${p.role || ''}</div>
      <div class="piece-name">${p.item?.name || ''}</div>
      <div class="piece-brand">${p.item?.brand || ''}</div>
    </div>`;
  }).join('');

  // Shoe options
  const sp = outfit.shoe_primary;
  const sa = outfit.shoe_alternative;
  const spItem = sp?.item || wardrobeItem(sp?.item_id);
  const saItem = sa?.item || wardrobeItem(sa?.item_id);

  const shoeHtml = (sp || sa) ? `
    <div class="shoe-section">
      <div class="shoe-section-lbl">Footwear</div>
      <div class="shoe-options">
        ${sp ? `<div class="shoe-opt">
          ${spItem?.image ? `<img src="${spItem.image}" alt="${spItem.name}" loading="lazy">` : '<div style="width:64px;height:64px;background:#f5f3f0;border:1px solid var(--border);flex-shrink:0"></div>'}
          <div>
            <div class="shoe-badge">✓ Wear this</div>
            <div class="shoe-name">${spItem?.name || sp.item_id || ''}</div>
            <div class="shoe-why">${sp.rationale || ''}</div>
          </div>
        </div>` : ''}
        ${sa ? `<div class="shoe-opt">
          ${saItem?.image ? `<img src="${saItem.image}" alt="${saItem.name}" loading="lazy">` : '<div style="width:64px;height:64px;background:#f5f3f0;border:1px solid var(--border);flex-shrink:0"></div>'}
          <div>
            <div class="shoe-badge alt">↳ Alternative</div>
            <div class="shoe-name">${saItem?.name || sa.item_id || ''}</div>
            <div class="shoe-why">${sa.rationale || ''}</div>
          </div>
        </div>` : ''}
      </div>
    </div>` : '';

  // Principles
  const principlesHtml = (outfit.principles_applied || []).length
    ? `<div class="principles-section">
        <div class="principles-lbl">Principles applied</div>
        <ul class="principles-list">
          ${outfit.principles_applied.map(p => `<li>${p}</li>`).join('')}
        </ul>
      </div>` : '';

  const whyHtml = outfit.why_it_works
    ? `<div class="why-block"><span class="why-lbl">Why it works</span>${outfit.why_it_works}</div>` : '';

  const tuckHtml = outfit.tuck_instruction
    ? `<div class="tuck-block"><span class="tuck-lbl">Tuck</span>${outfit.tuck_instruction}</div>` : '';

  board.innerHTML = `
    <div class="board-header">
      <div class="board-meta">
        <div class="board-rank">#${idx + 1} — ${rankLabel}</div>
        <div class="board-title">${outfit.title || 'Outfit'}</div>
        <div class="board-mood">${outfit.mood || ''}</div>
      </div>
      ${outfit.north_star ? `<div class="ns-badge" style="background:${ns.bg};color:${ns.color};border-color:${ns.border}">${outfit.north_star}</div>` : ''}
    </div>

    <div class="pieces-scroll">
      <div class="pieces-grid">${piecesHtml}</div>
    </div>

    <div class="board-actions">
      <button class="action-btn save-btn ${isSaved ? 'saved' : ''}" data-outfit-idx="${idx}">
        ${isSaved ? '✓ Saved' : 'Save'}
      </button>
    </div>

    <button class="board-toggle" aria-expanded="false">
      <span>Styling details</span>
      <span class="toggle-icon">▾</span>
    </button>

    <div class="board-collapsible">
      <div class="board-details">
        ${tuckHtml}
        ${shoeHtml}
        ${principlesHtml}
        ${whyHtml}
      </div>
    </div>
  `;

  // Toggle expand
  board.querySelector('.board-toggle').addEventListener('click', function() {
    const expanded = board.classList.toggle('expanded');
    this.setAttribute('aria-expanded', expanded);
    this.querySelector('span:first-child').textContent = expanded ? 'Hide details' : 'Styling details';
  });

  // Save button
  board.querySelector('.save-btn').addEventListener('click', () => toggleSave(outfit, board));

  return board;
}

// ── Save / Gallery ──────────────────────────────────────────────────────
function toggleSave(outfit, boardEl) {
  const existing = savedOutfits.findIndex(s => s.id === outfit.id);
  const btn = boardEl.querySelector('.save-btn');
  if (existing >= 0) {
    savedOutfits.splice(existing, 1);
    btn.textContent = 'Save';
    btn.classList.remove('saved');
  } else {
    savedOutfits.unshift({ ...outfit, savedAt: Date.now() });
    btn.textContent = '✓ Saved';
    btn.classList.add('saved');
  }
  localStorage.setItem('mia_saved_outfits', JSON.stringify(savedOutfits));
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  const empty = document.getElementById('galleryEmpty');
  const count = document.getElementById('galleryCount');

  grid.innerHTML = '';
  count.textContent = savedOutfits.length ? `${savedOutfits.length} saved` : '';

  if (!savedOutfits.length) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  savedOutfits.forEach(outfit => {
    const thumbItems = (outfit.pieces || []).slice(0, 3).filter(p => p.item?.image);
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.innerHTML = `
      <div class="gallery-card-images">
        ${thumbItems.map(p => `<div class="gallery-thumb"><img src="${p.item.image}" alt="${p.item.name}" loading="lazy"></div>`).join('')}
        ${thumbItems.length < 3 ? Array(3 - thumbItems.length).fill('<div class="gallery-thumb" style="background:#f5f3f0"></div>').join('') : ''}
      </div>
      <div class="gallery-card-title">${outfit.title || 'Outfit'}</div>
      <div class="gallery-card-meta">${outfit.mood || outfit.occasion || ''}</div>
    `;
    card.addEventListener('click', () => {
      // Switch to generate view and show the outfit
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'generate'));
      document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-generate'));
      activeView = 'generate';
      const container = document.getElementById('boardsContainer');
      container.innerHTML = '';
      container.appendChild(buildBoard(outfit, 0));
      container.scrollIntoView({ behavior: 'smooth' });
    });
    grid.appendChild(card);
  });
}

// ── Wardrobe browser ────────────────────────────────────────────────────
function renderWardrobe() {
  const categories = ['all', ...new Set(wardrobe.map(it => it.category))];
  const filters = document.getElementById('catFilters');
  filters.innerHTML = categories.map(c =>
    `<button class="cat-btn ${c === 'all' ? 'active' : ''}" data-cat="${c}">${c === 'all' ? 'All' : c.charAt(0).toUpperCase() + c.slice(1)}</button>`
  ).join('');

  filters.addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    wardrobeCat = btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderWardrobeGrid();
  });

  document.getElementById('wardrobeSearch').addEventListener('input', e => {
    wardrobeQuery = e.target.value.toLowerCase();
    renderWardrobeGrid();
  });

  renderWardrobeGrid();
}

function renderWardrobeGrid() {
  const grid = document.getElementById('wardrobeGrid');
  const filtered = wardrobe.filter(it => {
    const catOk = wardrobeCat === 'all' || it.category === wardrobeCat;
    const searchOk = !wardrobeQuery ||
      it.name.toLowerCase().includes(wardrobeQuery) ||
      it.brand.toLowerCase().includes(wardrobeQuery) ||
      (it.tags || []).some(t => t.toLowerCase().includes(wardrobeQuery));
    return catOk && searchOk;
  });

  grid.innerHTML = filtered.map(it => `
    <div class="wardrobe-item">
      <div class="wardrobe-img">
        ${it.image
          ? `<img src="${it.image}" alt="${it.name}" loading="lazy">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);background:#f5f3f0">${it.id}</div>`
        }
      </div>
      <div class="wardrobe-info">
        <div class="wardrobe-id">${it.id}</div>
        <div class="wardrobe-name">${it.name}</div>
        <div class="wardrobe-brand">${it.brand}</div>
      </div>
    </div>
  `).join('');
}

// ── Boot ────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
